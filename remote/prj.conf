# Ultimate Flipboard — PPR remote core (nRF54H20 cpuppr)

CONFIG_PRINTK=y

CONFIG_LOG=y
CONFIG_LOG_PROCESS_THREAD_PRIORITY=-15
CONFIG_LOG_PROCESS_THREAD_CUSTOM_PRIORITY=y

# IPC service (mailbox backend auto-selected from board DTS)
CONFIG_HEAP_MEM_POOL_SIZE=2048
CONFIG_MBOX=y
CONFIG_IPC_SERVICE=y
CONFIG_IPC_SERVICE_LOG_LEVEL_INF=y

# GPIO for button inputs
CONFIG_GPIO=y

# PPR does not manage power for other domains
CONFIG_PM=n
